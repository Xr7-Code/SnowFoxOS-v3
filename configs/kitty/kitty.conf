# SnowFoxOS v3 — Kitty Config

# ─────────────────────────────────────────────
# Font
font_family      Noto Sans Mono
font_size        12.0
adjust_line_height 110%

# ─────────────────────────────────────────────
# Farben (SnowFoxOS)
background            #0f0f0f
foreground            #e8e8e8
selection_background  #2a2a2a
selection_foreground  #e8e8e8
cursor                #9B59B6
cursor_text_color     #0f0f0f

# Normal
color0  #0f0f0f
color1  #E67E22
color2  #9B59B6
color3  #E67E22
color4  #9B59B6
color5  #9B59B6
color6  #e8e8e8
color7  #e8e8e8

# Hell
color8  #3a3a3a
color9  #E67E22
color10 #9B59B6
color11 #E67E22
color12 #9B59B6
color13 #9B59B6
color14 #e8e8e8
color15 #e8e8e8

# ─────────────────────────────────────────────
# Fenster
background_opacity      0.92
window_padding_width    10
hide_window_decorations yes
remember_window_size    yes

# ─────────────────────────────────────────────
# Tabs
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_background   #9B59B6
active_tab_foreground   #0f0f0f
inactive_tab_background #1a1a1a
inactive_tab_foreground #3a3a3a

# ─────────────────────────────────────────────
# Scrollback
scrollback_lines 5000

# ─────────────────────────────────────────────
# URL
url_color              #9B59B6
url_style              curly
open_url_with          librewolf

# ─────────────────────────────────────────────
# Performance
repaint_delay    8
input_delay      2
sync_to_monitor  yes
